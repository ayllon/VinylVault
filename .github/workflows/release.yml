name: Build release artifacts

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build and package for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('app/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Rust
        uses: actions-rs/toolchain@b2417cde72dcf67f306c0ae8e0828a81bf0b189f # v1.0.6
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y build-essential curl libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libsecret-1-dev pkg-config libssl-dev ruby ruby-dev rpm dpkg-dev

          # Install linuxdeploy, plugin and appimagetool for AppImage creation
          curl -Lo linuxdeploy-x86_64.AppImage "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy

          curl -Lo linuxdeploy-plugin-appimage-x86_64.AppImage "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage"
          chmod +x linuxdeploy-plugin-appimage-x86_64.AppImage
          sudo mv linuxdeploy-plugin-appimage-x86_64.AppImage /usr/local/bin/linuxdeploy-plugin-appimage

          curl -Lo appimagetool-x86_64.AppImage "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

          # Install fpm (optional, used for deb/rpm packaging)
          sudo gem install --no-document fpm || true

      - name: Ensure /usr/local/bin is on PATH (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "/usr/local/bin" >> $GITHUB_PATH
          echo "PATH after update: $PATH"

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build frontend
        working-directory: app
        run: npm run build

      - name: Build Tauri app
        working-directory: app
        run: npm run tauri -- build

      - name: Show bundles (Linux debug)
        if: runner.os == 'Linux'
        run: |
          echo "Bundles in app/src-tauri/target/release/bundle:"
          ls -la app/src-tauri/target/release/bundle || true

      - name: Show bundles (Windows debug)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Output "Bundles in app/src-tauri/target/release/bundle:"
          if (Test-Path 'app/src-tauri/target/release/bundle') {
            Get-ChildItem 'app/src-tauri/target/release/bundle' -Recurse -Force | Format-List
          } else {
            Write-Output 'No bundle directory found'
          }

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-tauri-bundles
          path: app/src-tauri/target/release/bundle/**
          retention-days: 7
