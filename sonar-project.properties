sonar.projectKey=ayllon_VinylVault
sonar.organization=ayllon

# Sources: TypeScript frontend, Rust backend, Python migration scripts
sonar.sources=app/src,app/src-tauri/src,scripts

sonar.exclusions=\
  app/src-tauri/target/**,\
  app/node_modules/**,\
  **/__pycache__/**,\
  scripts/.venv/**,\
  scripts/discografia.egg-info/**,\
  scripts/covers/**

# TypeScript
sonar.typescript.tsconfigPath=app/tsconfig.app.json

# Python
sonar.python.version=3.12
