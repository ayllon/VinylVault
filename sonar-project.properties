sonar.projectKey=ayllon_VinylVault
sonar.organization=ayllon

# Sources: TypeScript frontend, Rust backend
sonar.sources=app/src,app/src-tauri/src

sonar.exclusions=\
  app/src-tauri/target/**,\
  app/src-tauri/vendor/**,\
  app/node_modules/**,\
  **/__pycache__/**

# TypeScript
sonar.typescript.tsconfigPath=app/tsconfig.app.json
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info
sonar.test.inclusions=app/src/**/*.test.ts,app/src/**/*.test.tsx,app/src/test/**
sonar.coverage.exclusions=app/src/**/*.test.ts,app/src/**/*.test.tsx,app/src/test/**
sonar.cpd.exclusions=app/src/**/*.test.ts,app/src/**/*.test.tsx,app/src/test/**

# Rust coverage (LCOV generated via llvm-cov/grcov/tarpaulin)
# Sonar will import whichever report file exists from this list.
sonar.rust.lcov.reportPaths=app/src-tauri/coverage/lcov.info,app/src-tauri/target/llvm-cov/lcov.info

# Python
sonar.python.version=3.12
