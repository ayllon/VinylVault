name: Build release artifacts

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and package for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('app/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # 1.15.3
        with:
          toolchain: stable
          override: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y build-essential curl libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libsecret-1-dev pkg-config libssl-dev ruby ruby-dev rpm dpkg-dev

          # Install fpm (optional, used for deb/rpm packaging)
          sudo gem install --no-document fpm || true

      - name: Set version with build ID
        shell: bash
        run: |
          BUILD_ID=$(date +%Y%m%d)
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          VERSION=$(grep '"version"' app/src-tauri/tauri.conf.json | head -1 | cut -d'"' -f4)
          MAJOR_MINOR=$(echo $VERSION | cut -d. -f1,2)
          NEW_VERSION="${MAJOR_MINOR}.${BUILD_ID}"
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          ./scripts/update-version.sh $BUILD_ID

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Build frontend
        working-directory: app
        run: npm run build

      - name: Build Tauri app
        working-directory: app
        run: npm run tauri -- build

      - name: Find and copy artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          find app/src-tauri/target/release/bundle/deb -name "*.deb" -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Find and copy artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Path app\src-tauri\target\release\bundle\msi -Filter *.msi -Recurse | Copy-Item -Destination artifacts\
          Get-ChildItem -Path artifacts

      - name: Upload artifacts for release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-installers
          path: artifacts/*
          retention-days: 7

  release:
    name: Create or update nightly release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create or update nightly release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: |
            **Automated nightly build from main branch**
            
            Build date: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
            
            ### Installation
            
            **Linux (Debian/Ubuntu):**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/nightly/vinylvault_amd64.deb
            sudo dpkg -i vinylvault_amd64.deb
            ```
            
            **Windows:**
            Download and run the `.msi` installer below.
            
            ---
            These builds are automatically generated and may be unstable.
          files: |
            artifacts/**/*.deb
            artifacts/**/*.msi
          prerelease: true
          draft: false
          fail_on_unmatched_files: false
